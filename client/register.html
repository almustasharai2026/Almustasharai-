<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="register_title">المستشار AI - تسجيل جديد</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <header class="auth-header">
      <h1 data-i18n="app_name">المستشار AI</h1>
      <div class="auth-controls">
        <button id="theme-toggle" class="btn btn-icon">🌙</button>
        <button id="lang-toggle" class="btn btn-icon">🌐 EN</button>
      </div>
    </header>

    <main class="auth-main card">
      <div class="auth-switcher">
        <a href="login.html" class="switch-btn" id="tab-login">🔐 <span data-i18n="login">تسجيل الدخول</span></a>
        <a href="register.html" class="switch-btn active" id="tab-register">✍️ <span data-i18n="register">إنشاء حساب</span></a>
      </div>

      <div class="auth-form">
        <h2 data-i18n="create_account">أنشئ حسابًا جديدًا</h2>
        <p data-i18n="register_description">استمتع بالاستشارات القانونية الذكية مع رصيد مجاني في البداية.</p>

        <div class="social-row">
          <button class="btn btn-google" id="oauth-google">Google</button>
          <button class="btn btn-facebook" id="oauth-facebook">Facebook</button>
          <button class="btn btn-yahoo" id="oauth-yahoo">Yahoo</button>
        </div>

        <div class="separator"><span data-i18n="or">أو</span></div>

        <form id="register-form" novalidate>
          <label for="register-email" data-i18n="email">البريد الإلكتروني</label>
          <input id="register-email" type="email" placeholder="you@domain.com" required data-i18n-placeholder="email_placeholder" />

          <label for="register-phone" data-i18n="phone">الهاتف</label>
          <input id="register-phone" type="tel" placeholder="+9665XXXXXXX" required data-i18n-placeholder="phone_placeholder" />

          <label for="register-password" data-i18n="password">كلمة المرور</label>
          <input id="register-password" type="password" placeholder="••••••••" required data-i18n-placeholder="password_placeholder" />

          <label for="register-confirm-password" data-i18n="confirm_password">تأكيد كلمة المرور</label>
          <input id="register-confirm-password" type="password" placeholder="••••••••" required data-i18n-placeholder="confirm_password_placeholder" />

          <label for="register-avatar" data-i18n="avatar">الصورة الشخصية (اختياري)</label>
          <input id="register-avatar" type="file" accept="image/*" />
          <img id="avatar-preview" class="avatar-preview hidden" alt="Avatar Preview" />

          <button type="submit" class="btn btn-primary" data-i18n="register">إنشاء الحساب</button>
        </form>

        <div class="aside-links">
          <a href="login.html" data-i18n="already_have_account">لديك حساب؟ تسجيل الدخول</a>
        </div>

        <div id="register-message" class="message hidden"></div>
      </div>
    </main>
  </div>

  <script src="lang.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
