<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المستشار AI - لوحة الإدارة</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>المستشار AI</h2>
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="templates.html">النماذج والقوالب</a></li>
            <li><a href="user.html">لوحة المستخدم</a></li>
            <li><a href="owner.html" class="active">لوحة الإدارة</a></li>
            <li><a href="payment.html">الدفع</a></li>
            <li class="divider"></li>
            <li><button id="dark-mode-toggle">الوضع المظلم</button></li>
            <li><button id="lang-toggle">English</button></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <h1>لوحة الإدارة</h1>
            <p class="subtitle">إدارة طلبات الدفع والإحصائيات</p>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>إجمالي المستخدمين</h3>
                    <p class="stat-number" id="total-users">0</p>
                </div>
                <div class="stat-card">
                    <h3>إجمالي الاستشارات</h3>
                    <p class="stat-number" id="total-consultations">0</p>
                </div>
                <div class="stat-card">
                    <h3>طلبات دفع معلقة</h3>
                    <p class="stat-number" id="pending-payments">0</p>
                </div>
            </div>

            <!-- Payment Requests Management -->
            <div class="payment-management">
                <h2>طلبات الدفع</h2>
                <div id="payment-requests-table">
                    <!-- Payment requests will be loaded here -->
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/requests.js"></script>
</body>
</html>
