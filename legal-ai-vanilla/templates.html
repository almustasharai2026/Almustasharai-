<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المستشار AI - النماذج والقوالب</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>المستشار AI</h2>
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="templates.html" class="active">النماذج والقوالب</a></li>
            <li><a href="user.html">لوحة المستخدم</a></li>
            <li><a href="owner.html">لوحة الإدارة</a></li>
            <li><a href="payment.html">الدفع</a></li>
            <li class="divider"></li>
            <li><button id="dark-mode-toggle">الوضع المظلم</button></li>
            <li><button id="lang-toggle">English</button></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <h1>النماذج والقوالب القانونية</h1>
            <p class="subtitle">اختر نوع النموذج واملأ البيانات لإنشاء وثيقة قانونية</p>

            <!-- Template Selection -->
            <div class="template-selection">
                <h2>اختر نوع النموذج</h2>
                <div class="template-buttons">
                    <button class="template-btn" data-template="employment">عقد عمل</button>
                    <button class="template-btn" data-template="partnership">عقد شراكة</button>
                    <button class="template-btn" data-template="lawsuit">صحيفة دعوى</button>
                    <button class="template-btn" data-template="memo">مذكرة قانونية</button>
                </div>
            </div>

            <!-- Dynamic Form -->
            <div id="template-form" class="template-form" style="display: none;">
                <h2 id="form-title">نموذج</h2>
                <form id="dynamic-form">
                    <!-- Form fields will be added here dynamically -->
                </form>
                <div class="form-actions">
                    <button type="button" id="generate-btn" class="btn-primary">إنشاء الوثيقة</button>
                </div>
            </div>

            <!-- Generated Document -->
            <div id="generated-document" class="generated-document" style="display: none;">
                <h2>الوثيقة المُنشأة</h2>
                <div id="document-content" class="document-content"></div>
                <div class="download-actions">
                    <button id="download-pdf" class="btn-secondary">تحميل PDF</button>
                    <button id="download-word" class="btn-secondary">تحميل Word</button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/templates.js"></script>
    <script src="js/downloads.js"></script>
</body>
</html>
