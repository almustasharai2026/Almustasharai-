<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <title>المستشار AI - تسجيل الدخول</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>المستشار AI</h2>
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="templates.html">النماذج والقوالب</a></li>
            <li><a href="user.html">لوحة المستخدم</a></li>

        </ul>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <div class="login-form">
                <h1>تسجيل الدخول</h1>
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">البريد الإلكتروني</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">كلمة المرور</label>
                        <input type="password" id="password" required>
                    </div>
                    <button type="submit" class="btn-primary">دخول</button>
                </form>
                <p class="note">استخدم owner@law.com / owner للدخول كمدير</p>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/downloads.js"></script>
