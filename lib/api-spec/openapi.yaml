openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Legal AI API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: chat
    description: Chat operations
  - name: documents
    description: Document operations
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /chat:
    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send chat message
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Chat response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /upload:
    post:
      operationId: uploadFile
      tags: [documents]
      summary: Upload file
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /generate-document:
    post:
      operationId: generateDocument
      tags: [documents]
      summary: Generate legal document
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDocumentRequest"
      responses:
        "200":
          description: Document generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateDocumentResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user info
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/users:
    get:
      operationId: adminGetUsers
      tags: [admin]
      summary: Get all users (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUsersResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get admin statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/charge:
    post:
      operationId: adminChargeUser
      tags: [admin]
      summary: Charge user balance (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChargeRequest"
      responses:
        "200":
          description: Charge successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChargeResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        name:
          type: string
        phone:
          type: string
      required:
        - email
        - password
        - name
        - phone
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserInfo"
      required:
        - token
        - user
    UserInfo:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        phone:
          type: string
        balance:
          type: number
        role:
          type: string
        created_at:
          type: string
      required:
        - id
        - email
        - name
        - phone
        - balance
        - role
        - created_at
    ChatRequest:
      type: object
      properties:
        persona:
          type: string
        message:
          type: string
      required:
        - persona
        - message
    ChatResponse:
      type: object
      properties:
        reply:
          type: string
        balance:
          type: number
        conversation_id:
          type: integer
      required:
        - reply
        - balance
        - conversation_id
    UploadResponse:
      type: object
      properties:
        url:
          type: string
        filename:
          type: string
        text:
          type: string
      required:
        - url
        - filename
        - text
    GenerateDocumentRequest:
      type: object
      properties:
        type:
          type: string
          enum: [contract, defense_memo, lawsuit]
        data:
          type: object
          additionalProperties: true
      required:
        - type
        - data
    GenerateDocumentResponse:
      type: object
      properties:
        content:
          type: string
        filename:
          type: string
      required:
        - content
        - filename
    AdminUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserInfo"
      required:
        - users
    AdminStats:
      type: object
      properties:
        total_users:
          type: integer
        total_balance:
          type: number
        total_conversations:
          type: integer
        total_transactions:
          type: integer
      required:
        - total_users
        - total_balance
        - total_conversations
        - total_transactions
    ChargeRequest:
      type: object
      properties:
        user_id:
          type: integer
        amount:
          type: number
      required:
        - user_id
        - amount
    ChargeResponse:
      type: object
      properties:
        success:
          type: boolean
        new_balance:
          type: number
        message:
          type: string
      required:
        - success
        - new_balance
        - message
